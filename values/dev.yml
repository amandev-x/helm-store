# ================================================
# HelmStore — Development Environment Overrides
# Only contains values that DIFFER from defaults
# ================================================

# ── product-service overrides ──
productService:
  replicaCount: 1
  image:
    tag: "python3.11"
  config:
    dbHost: "product-db-postgresql.helmstore.svc.cluster.local"
    dbPort: "5432"
    dbName: "products"
    dbUser: "helmstore"
    logLevel: "debug"          # debug in dev!
    appEnv: "development"
  secrets:
    dbPassword: "helmstore-dev-123"
  resources:
    limits:
      cpu: 200m                # lower limits in dev
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 64Mi

# ── cart-service overrides ──
cartService:
  replicaCount: 1
  config:
    redisHost: "cart-redis-master.helmstore.svc.cluster.local"
    redisPort: "6379"
    redisAuth: "false"
    logLevel: "debug"
    appEnv: "development"
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 64Mi